name: Build Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and publish (Release, self-contained, single file)
        run: >
          dotnet publish src/ExcelEntityExporter/ExcelEntityExporter.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./artifacts

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-entity-exporter
          path: artifacts/installer-entity-exporter.exe
          if-no-files-found: error
          retention-days: 90
