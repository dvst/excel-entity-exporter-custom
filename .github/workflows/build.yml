name: Build Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate version string
        id: version
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyy-MM-dd"
          $hash = (git rev-parse --short HEAD)
          $version = "$date-$hash"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

          # Generate VersionInfo.cs with the actual version
          $content = @"
          namespace ExcelEntityExporter;

          internal static class VersionInfo
          {
              public const string Version = "$version";
          }
          "@
          $content | Out-File -FilePath "src/ExcelEntityExporter/VersionInfo.cs" -Encoding utf8
          Write-Host "Version: $version"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --verbosity normal

      - name: Build and publish (Release, self-contained, single file)
        run: >
          dotnet publish src/ExcelEntityExporter/ExcelEntityExporter.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}
          -p:FileVersion=${{ steps.version.outputs.VERSION }}
          -o ./artifacts

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-entity-exporter
          path: artifacts/installer-entity-exporter.exe
          if-no-files-found: error
          retention-days: 90

      - name: Create or update GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.version.outputs.VERSION }})"
          body: |
            **Version:** ${{ steps.version.outputs.VERSION }}

            Auto-built from the latest commit on `main`.

            **Usage:**
            1. Download `installer-entity-exporter.exe`
            2. Double-click it → click **Instalar**
            3. Right-click any `.xlsx` file → select **Exportar por Entidad y Fecha**
            4. To uninstall: double-click the installer again → click **Desinstalar**
          files: artifacts/installer-entity-exporter.exe
          prerelease: false
