name: Build Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate version string
        id: version
        shell: pwsh
        run: |
          $year = Get-Date -Format "yyyy"
          $month = Get-Date -Format "MM"
          $day = Get-Date -Format "dd"
          $hash = (git rev-parse --short HEAD)

          # Human-readable version for VersionInfo.cs and UI display
          $displayVersion = "$year-$month-$day-$hash"

          # Numeric version for AssemblyVersion / FileVersion (required format: major.minor.build.revision)
          # Convert first 4 hex chars of hash to a decimal number for the revision component
          $hashDecimal = [Convert]::ToInt32($hash.Substring(0, [Math]::Min(4, $hash.Length)), 16)
          $numericVersion = "$([int]$year).$([int]$month).$([int]$day).$hashDecimal"

          echo "VERSION=$displayVersion" >> $env:GITHUB_OUTPUT
          echo "NUMERIC_VERSION=$numericVersion" >> $env:GITHUB_OUTPUT

          # Generate VersionInfo.cs with the human-readable version
          $content = @"
          namespace ExcelEntityExporter;

          internal static class VersionInfo
          {
              public const string Version = "$displayVersion";
          }
          "@
          $content | Out-File -FilePath "src/ExcelEntityExporter/VersionInfo.cs" -Encoding utf8
          Write-Host "Display version: $displayVersion"
          Write-Host "Numeric version: $numericVersion"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --verbosity normal

      - name: Build and publish (x64)
        run: >
          dotnet publish src/ExcelEntityExporter/ExcelEntityExporter.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.NUMERIC_VERSION }}
          -p:FileVersion=${{ steps.version.outputs.NUMERIC_VERSION }}
          -o ./artifacts/x64

      - name: Build and publish (ARM64)
        run: >
          dotnet publish src/ExcelEntityExporter/ExcelEntityExporter.csproj
          -c Release
          -r win-arm64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.NUMERIC_VERSION }}
          -p:FileVersion=${{ steps.version.outputs.NUMERIC_VERSION }}
          -o ./artifacts/arm64

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-entity-exporter-x64
          path: artifacts/x64/installer-entity-exporter.exe
          if-no-files-found: error
          retention-days: 90

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-entity-exporter-arm64
          path: artifacts/arm64/installer-entity-exporter.exe
          if-no-files-found: error
          retention-days: 90

      - name: Create or update GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.version.outputs.VERSION }})"
          body: |
            **Version:** ${{ steps.version.outputs.VERSION }}

            Auto-built from the latest commit on `main`.

            **Downloads:**
            - **`installer-entity-exporter-x64.exe`** — for most Windows PCs (Intel/AMD processors)
            - **`installer-entity-exporter-arm64.exe`** — for Windows on ARM (Surface Pro X, Snapdragon laptops)

            **Usage:**
            1. Download the correct `.exe` for your architecture
            2. Double-click it → click **Instalar**
            3. Right-click any `.xlsx` file → select **Exportar por Entidad y Fecha**
            4. To uninstall: double-click the installer again → click **Desinstalar**
          files: |
            artifacts/x64/installer-entity-exporter.exe
            artifacts/arm64/installer-entity-exporter.exe
          prerelease: false
